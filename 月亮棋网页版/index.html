<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月亮棋</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="moon-deco"></div>
    <div class="container">
        <h1>月亮棋</h1>
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="pvp">👥 双人对战</button>
            <button class="mode-btn" data-mode="pve">🤖 人机对战</button>
        </div>
        <div class="difficulty-selector" id="difficultySelector" style="display:none">
            <button class="diff-btn" data-diff="easy">🌙 简单</button>
            <button class="diff-btn active" data-diff="medium">🌓 中等</button>
            <button class="diff-btn" data-diff="hard">🌕 困难</button>
        </div>
        <div class="status" id="status">黑棋先行</div>
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <button class="reset-btn" id="resetBtn">重新开始</button>
    </div>
    
    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2 id="winMessage">黑棋获胜！</h2>
            <button class="reset-btn" id="modalResetBtn">再来一局</button>
        </div>
    </div>
    
    <div class="moon-char" id="moonChar">🌙</div>
    <button class="sound-toggle" id="soundToggle" title="音效开关">🔊</button>

    <script src="game.js"></script>
</body>
</html>
